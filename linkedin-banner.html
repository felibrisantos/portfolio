<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584">
<title>LinkedIn Banner — Felipe Brigagão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400;1,6..96,700&family=Sora:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper: #09090B;
    --ink: #FFFFFF;
    --surface: #121215;
    --accent: #00E5FF;
    --muted: #888888;
    --faint: rgba(255, 255, 255, 0.12);
  }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    border: 1px solid var(--faint);
  }

  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    z-index: 10;
    pointer-events: none;
  }

  .bg-number {
    position: absolute;
    right: 80px;
    top: -60px;
    font-family: 'Bodoni Moda', serif;
    font-size: 520px;
    font-weight: 400;
    font-style: italic;
    line-height: 1;
    color: var(--accent);
    opacity: 0.03;
    z-index: 1;
    user-select: none;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 5;
    display: flex;
    width: 100%;
    align-items: center;
  }

  .section-name {
    padding-left: 100px;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .label {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    opacity: 0.8;
  }

  .name {
    font-family: 'Bodoni Moda', serif;
    font-size: 100px;
    font-weight: 700;
    font-style: italic;
    color: var(--ink);
    line-height: 0.8;
    letter-spacing: -4px;
    margin-bottom: 12px;
    white-space: nowrap;
    display: flex;
    align-items: baseline;
  }

  .period {
    color: var(--accent);
    opacity: 0.8;
  }

  .cursor {
    display: inline-block;
    width: 4px;
    height: 70px;
    background: var(--accent);
    margin-left: 12px;
    animation: blink 1.1s step-end infinite;
    vertical-align: baseline;
    position: relative;
    top: 8px;
    opacity: 0.6;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .first-name {
    font-family: 'Bodoni Moda', serif;
    font-size: 28px;
    font-weight: 400;
    font-style: normal;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 32px;
    opacity: 0.6;
  }

  .location {
    font-family: 'Fira Code', monospace;
    font-size: 9px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .location-dot {
    width: 4px;
    height: 4px;
    background: var(--accent);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .separator {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 80px;
  }

  .separator-line {
    width: 1px;
    height: 180px;
    background: var(--faint);
    position: relative;
  }

  .separator-line::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 1px;
    background: var(--accent);
  }

  .separator-line::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 1px;
    background: var(--accent);
  }

  .section-stack {
    padding-right: 100px;
    flex: 0 0 auto;
    text-align: right;
  }

  .stack-label {
    font-family: 'Fira Code', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    opacity: 0.5;
  }

  .stack-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  }

  .stack-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .tech-tag {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 6px 18px;
    border: 0.5px solid var(--faint);
    background: rgba(255, 255, 255, 0.02);
    backdrop-blur: 4px;
    letter-spacing: 0.1em;
    white-space: nowrap;
    transition: all 0.3s ease;
  }

  .tech-tag.accent {
    color: var(--accent);
    border-color: rgba(0, 229, 255, 0.2);
    background: rgba(0, 229, 255, 0.03);
  }

  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--accent);
    opacity: 0.2;
    z-index: 5;
  }

  .top-line {
    position: absolute;
    top: 0;
    left: 100px;
    right: 100px;
    height: 0.5px;
    background: var(--faint);
    z-index: 5;
  }

  .margin-line {
    position: absolute;
    left: 70px;
    top: 0;
    bottom: 0;
    width: 0.5px;
    background: var(--faint);
    opacity: 0.3;
    z-index: 2;
  }

  .colophon {
    position: absolute;
    bottom: 24px;
    right: 100px;
    font-family: 'Fira Code', monospace;
    font-size: 8px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.3;
    z-index: 6;
  }
</style>
</head>
<body>

<div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100;">
  <button onclick="exportBanner()" style="font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; padding: 12px 24px; border: 0.5px solid var(--accent); color: var(--accent); background: rgba(9, 9, 11, 0.8); backdrop-blur: 10px; cursor: pointer; transition: all 0.3s ease;">
    [ EXPORT_TO_PNG ]
  </button>
</div>

<div class="banner" id="banner-root">
  <div class="bg-number">B</div>
  <div class="margin-line"></div>

  <div class="content">
    <div class="section-name">
      <div class="label">[ SYSTEM_ARCHITECT ]</div>
      <div class="name">Brigagão<span class="period">_</span><span class="cursor"></span></div>
      <div class="first-name">FELIPE BRIGAGÃO SANTOS</div>
      <div class="location">
        <span class="location-dot"></span>
        GRU-INTL // SÃO PAULO, BR
      </div>
    </div>

    <div class="separator">
      <div class="separator-line"></div>
    </div>

    <div class="section-stack">
      <div class="stack-label">REGISTRY // STACK_CORE</div>
      <div class="stack-grid">
        <div class="stack-row">
          <span class="tech-tag accent">[React]</span>
          <span class="tech-tag accent">[Next.js]</span>
          <span class="tech-tag">[TypeScript]</span>
        </div>
        <div class="stack-row">
          <span class="tech-tag">[Node.js]</span>
          <span class="tech-tag">[Python]</span>
          <span class="tech-tag">[PostgreSQL]</span>
        </div>
        <div class="stack-row">
          <span class="tech-tag accent">[LLM_Agentes]</span>
          <span class="tech-tag accent">[MCP_Protocol]</span>
        </div>
        <div class="stack-row">
          <span class="tech-tag">[AWS_Cloud]</span>
          <span class="tech-tag">[Vercel_Edge]</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
  <div class="top-line"></div>
  <div class="colophon">SYS_VER: 2.0.4 // 2026</div>
</div>

<canvas id="exportCanvas" width="1584" height="396" style="display:none;"></canvas>

<script>
  async function exportBanner() {
    await document.fonts.ready;
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d');
    
    // Background
    ctx.fillStyle = '#09090B';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grain (Simulated)
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 10000; i++) {
      ctx.fillStyle = Math.random() > 0.5 ? '#FFF' : '#000';
      ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
    }
    ctx.globalAlpha = 1.0;

    // Big B
    ctx.font = 'italic 520px "Bodoni Moda"';
    ctx.fillStyle = '#00E5FF';
    ctx.globalAlpha = 0.03;
    ctx.fillText('B', 1100, 360);
    ctx.globalAlpha = 1.0;

    // Margin Line
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(70, 0);
    ctx.lineTo(70, canvas.height);
    ctx.stroke();

    // Content Left
    ctx.fillStyle = '#00E5FF';
    ctx.font = '10px "Fira Code"';
    ctx.fillText('[ SYSTEM_ARCHITECT ]', 100, 100);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'italic 700 100px "Bodoni Moda"';
    ctx.fillText('Brigagão', 100, 200);
    
    const nameWidth = ctx.measureText('Brigagão').width;
    ctx.fillStyle = '#00E5FF';
    ctx.fillText('_', 100 + nameWidth, 200);

    ctx.fillStyle = '#888888';
    ctx.font = '28px "Bodoni Moda"';
    ctx.fillText('FELIPE BRIGAGÃO SANTOS', 100, 250);

    ctx.font = '9px "Fira Code"';
    ctx.fillText('GRU-INTL // SÃO PAULO, BR', 116, 300);
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(100, 294, 4, 4);

    // Separator
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.moveTo(800, 100);
    ctx.lineTo(800, 300);
    ctx.stroke();
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(797, 100, 6, 1);
    ctx.fillRect(797, 300, 6, 1);

    // Right Content (Stack)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#888888';
    ctx.font = '9px "Fira Code"';
    ctx.fillText('REGISTRY // STACK_CORE', 1484, 100);

    const tags = [
      ['[React]', '[Next.js]', '[TypeScript]'],
      ['[Node.js]', '[Python]', '[PostgreSQL]'],
      ['[LLM_Agentes]', '[MCP_Protocol]'],
      ['[AWS_Cloud]', '[Vercel_Edge]']
    ];

    let currentY = 150;
    tags.forEach(row => {
      let currentX = 1484;
      row.reverse().forEach(tag => {
        ctx.font = '10px "Fira Code"';
        const w = ctx.measureText(tag).width + 36;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.strokeRect(currentX - w, currentY - 15, w, 25);
        ctx.fillStyle = tag.includes('React') || tag.includes('Next') || tag.includes('LLM') || tag.includes('MCP') ? '#00E5FF' : '#888888';
        ctx.fillText(tag, currentX - 18, currentY);
        currentX -= (w + 10);
      });
      currentY += 40;
    });

    // Final details
    ctx.fillStyle = '#888888';
    ctx.globalAlpha = 0.3;
    ctx.fillText('SYS_VER: 2.0.4 // 2026', 1484, 370);
    
    const link = document.createElement('a');
    link.download = 'Felipe_Brigagao_LinkedIn_Banner.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>
